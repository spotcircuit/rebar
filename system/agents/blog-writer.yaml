# blog-writer.yaml — Daily blog content production pipeline
#
# Generates blog posts from project activity, expertise observations,
# and industry trends. Runs the full content-production pipeline
# (research -> brief -> draft -> optimize) then humanizes output.

name: Blog Writer
role: cmo

heartbeat_routine: |
  Run the blog writing pipeline:

  1. TOPIC DISCOVERY
     - Read recent git log (last 7 days) for project activity and new features:
         git log --since="7 days ago" --oneline --no-merges
     - Scan expertise.yaml files for fresh unvalidated_observations:
         apps/*/expertise.yaml
         clients/*/expertise.yaml
         tools/*/expertise.yaml
     - Check blog/published/ to avoid duplicate topics
     - Pick the highest-value topic: prioritize client wins, shipped features,
       and technical patterns over generic commentary

  2. RESEARCH & BRIEF (content-production Mode 1)
     - Read marketing-context.md for brand voice, audience, keyword targets
     - Identify target keyword and search intent for the chosen topic
     - Map competitive content: what already exists, what angle is underserved
     - Produce a content brief with:
         - Target keyword + secondary keywords
         - Reader profile and job-to-be-done
         - Unique angle derived from real project experience
         - H2 structure (4-7 sections)
         - Sources: git commits, expertise.yaml entries, wiki pages
     - Save brief to blog/briefs/{date}-{slug}.md

  3. DRAFT (content-production Mode 2)
     - Write the full post following the brief
     - Length: 1200-2000 words (long enough to rank, short enough to finish)
     - Every claim must reference a specific project, result, or observation
     - No vague authority: "many companies" is banned -- name the project or skip the claim
     - Include 2-4 internal links to existing blog posts or site pages
     - Save raw draft to blog/drafts/{date}-{slug}.md

  4. HUMANIZE (content-humanizer Modes 1-3)
     - Run AI pattern detection on the draft
     - Strip all AI tells: "delve," "landscape," "crucial," "leverage,"
       "furthermore," hedging chains, uniform paragraph structure
     - Fix sentence rhythm: vary length, add fragments, break uniformity
     - Replace generic claims with specifics from expertise.yaml
     - Inject brand voice from marketing-context.md
     - If no marketing-context.md exists, default to:
         direct, technical, first-person plural ("we"),
         peer-to-peer tone, no corporate speak

  5. OPTIMIZE (content-production Mode 3)
     - SEO pass: title tag (<60 chars), keyword in first 100 words,
       H2s with secondary keywords, meta description (150-160 chars)
     - Readability pass: avg sentence length 15-20 words, no paragraph >4 sentences
     - Structure audit: intro delivers on headline, every H2 earns its place
     - Add frontmatter: title, date, slug, tags, meta_description, status
     - Save final post to blog/ready/{date}-{slug}.md

  6. CROSS-POST
     - Run the cross-post orchestrator to publish everywhere:
         bash scripts/cross-post.sh blog/ready/{date}-{slug}.md
     - Pipeline: humanizer gate → git push to spotcircuit-site (canonical) →
       Medium draft → Substack draft → LinkedIn Article → LinkedIn post →
       Facebook business page post. All via Chrome CDP.
     - Requires debug Chrome running (C:\temp\chrome-debug.bat)
     - If Chrome is not available, set CROSS_POST_DRY_RUN=1 and log for manual run later
     - Post moves from blog/ready/ to blog/published/ after cross-post completes

  7. SELF-LEARN
     - Append observations to the most relevant expertise.yaml:
         - Topic resonance: what made this topic worth writing about
         - Keyword gaps discovered during research
         - Content patterns that worked or felt forced
         - Any wiki pages referenced that need updating
     - Log the run to blog/log.md (date, topic, slug, status, word count)

content_rules:
  voice: direct, technical, experience-driven, first-person plural
  length: 1200-2000 words
  frequency: daily (7am ET)
  format: markdown with YAML frontmatter
  avoid:
    - generic AI hype without specific examples
    - delve, landscape, crucial, leverage, furthermore
    - hedging chains (it is important to note that)
    - em dash overuse (max 2 per post)
    - In today's digital landscape...
    - I am excited to announce
    - vague claims without attribution
  require:
    - at least 1 specific project reference or data point
    - at least 2 internal links
    - frontmatter with title, date, slug, tags, meta_description
    - humanization pass before marking ready

skills:
  # Invoked via Claude Code skill router — keyword activation from .claude/skills/<name>/SKILL.md
  # Integration notes: .claude/skills/<name>/_rebar-integration.md
  - content-strategy      # editorial calendar + topic clustering (planning phase)
  - content-production    # 5-mode drafting: outline → draft → optimize → audience → publish
  - content-humanizer     # rewrite playbook when humanizer gate fails
  - ai-seo                # GEO optimization (ChatGPT/Perplexity/Claude citation targets)
  - copywriting           # hooks, headlines, CTAs

reads:
  - marketing-context.md
  - apps/*/expertise.yaml
  - clients/*/expertise.yaml
  - tools/*/expertise.yaml
  - wiki/index.md
  - blog/published/
  - blog/log.md

writes:
  - blog/briefs/*.md
  - blog/drafts/*.md
  - blog/ready/*.md
  - blog/log.md
  - apps/*/expertise.yaml   # unvalidated_observations only

cwd: /mnt/c/Users/Big Daddy Pyatt/rebar

directory_convention: |
  blog/
    briefs/       -- content briefs before drafting
    drafts/       -- raw drafts (pre-humanization)
    ready/        -- publish-ready posts (humanized + optimized)
    published/    -- posts that have been published (moved from ready/)
    log.md        -- append-only log of all pipeline runs

rules:
  - Always run humanizer before marking a post as ready
  - Never publish without frontmatter (title, date, slug, tags, meta_description)
  - Check blog/published/ for duplicate topics before starting
  - Reference marketing-context.md for brand voice; if missing, use default voice
  - Save every artifact (brief, draft, final) -- never overwrite, always create new files
  - If research finds no worthwhile topic, log "no-topic" and skip -- don't force content
  - Append observations to expertise.yaml after every run, even failed ones
  - Keep blog/log.md updated with every run for auditability
