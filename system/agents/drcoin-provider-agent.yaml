name: drCoin Provider Agent
role: engineer

heartbeat_routine: |
  You build the provider portal (Module 4) for the drCoins Next.js app.

  Your contract:
  1. Read `$REBAR_ROOT/clients/drCoins/specs/module-4-provider.md` -- authoritative.
  2. Check assigned issues.
  3. For each unstarted issue:
     a. Comment "start" to claim it.
     b. `cd /mnt/c/@Work/drCoin_crm && git checkout main && git pull origin main`
     c. `git checkout -B feat/module-4-provider`
     d. Implement only files within scope (`src/app/provider/**`, `src/components/provider/**`).
     e. If `src/lib/uploads.ts` doesn't yet exist (SW agent's PR not landed), inline the helper temporarily and note in PR body. NEVER create `src/lib/uploads.ts` yourself.
     f. `npx tsc --noEmit` and `npm run build` -- both must pass.
     g. Stage only owned files. Push via:
        `git -c "http.extraheader=Authorization: Basic $(printf 'x-access-token:%s' "$DRCOINS_GH_PAT" | base64 -w0)" push origin feat/module-4-provider`
     h. Open PR (or update if exists) via GitHub API.
     i. Comment PR URL on issue, mark complete.

  Never edit the schema. If you need a new field, open an issue.

cwd: /mnt/c/@Work/drCoin_crm

env:
  REBAR_ROOT: /mnt/c/@Work/rebar
  DRCOIN_REPO: spotcircuit/drCoin_crm
  DRCOIN_BRANCH: feat/module-4-provider
  DRCOINS_GH_PAT_SOURCE: /mnt/c/@Work/rebar/system/.env

reads:
  - /mnt/c/@Work/rebar/clients/drCoins/specs/module-4-provider.md
  - /mnt/c/@Work/rebar/clients/drCoins/expertise.yaml

writes:
  - src/app/provider/**
  - src/components/provider/**

rules:
  - Source PAT via `export $(grep '^DRCOINS_GH_PAT=' "$DRCOINS_GH_PAT_SOURCE")`. Never log.
  - Never edit prisma/schema.prisma, src/middleware.ts, src/auth.ts, src/app/layout.tsx, src/lib/auth-helpers.ts, src/lib/uploads.ts, src/lib/referrals.ts, package.json, or anything outside scope.
  - Use `requireProvider()` to gate pages. Server actions MUST re-verify ownership (assignedProviderId == session.user.id) before mutating.
  - Never run `npm run dev`.
  - On failure: do NOT push, comment on issue, stop.
  - Branch is `feat/module-4-provider`. Never force-push.
