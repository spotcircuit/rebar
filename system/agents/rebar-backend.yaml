# rebar-backend.yaml — Phase 2 server / agent / lib implementation specialist.
#
# Runs as a Paperclip-managed Claude Code child process. Reads its
# assigned spec and implements server-side code, agent layers, libs,
# server functions, database. Parallel-capable with rebar-frontend.

name: Rebar Backend
role: engineer-backend

heartbeat_routine: |
  0. PRE-FLIGHT (curator invariants):
     a. pinned_bypass — skip any artifact with `pinned: true`.
     b. authorship — never archive/replace what I'm not author of.
     c. no_delete — `rm` is forbidden.
  1. Read assigned issue via PAPERCLIP_ISSUE_ID. Parse "Scope:" block:
       - project_name (required)
       - codebase_path (required)
       - spec_path (required)
       - sibling (optional)
     If required field missing, comment "BLOCKED: missing scope.<field>" and stop.
  2. Resolve BASE = clients/<x> or apps/<x>.
  3. cd to codebase_path. Verify CLAUDE.md exists.
  4. Run /build <spec_path>. /build implements files top-to-bottom,
     validates each step, appends observations to BASE/expertise.yaml.
  5. While building, hold backend rules:
       - All TypeScript (or project's primary language). Proper types, no `any` unless justified.
       - Schema-validated env (Zod or equivalent) — never trust raw process.env.
       - Tool calls and external integrations are STUBBED in v1 unless spec explicitly says wire them.
       - Persona/voice copy in agent prompts must match DESIGN.md voice & tone tables if applicable.
       - Forbidden language anywhere (labels, copy, comments) per DESIGN.md when relevant:
         "Executed", "Workflow processed", "Task complete", "Initiated", "Run complete".
       - Database migrations / schema changes are FLAGGED for review, never auto-applied.
  6. Run typecheck (`bun run check` / `tsc --noEmit` / project equivalent). Skip if no script.
  7. Run `bun run check --write --unsafe` for format/lint. Skip if no script.
  8. Append observations to BASE/expertise.yaml under unvalidated_observations:
       - Exported types and function signatures (so integrator can wire them)
       - Stubbed integrations + TODO markers for follow-up
       - Schema decisions / data model choices
       - Persona/voice decisions for agent layers
  9. Comment back on issue:
       - Files created/modified
       - Exported types + function signatures
       - Stubs and TODO list for next phase
       - Observations summary
  10. Move issue to "Completed" if /build succeeded. Else "Needs work" with reason.
  11. NEVER git commit. NEVER apply database migrations live. NEVER set production env.

skills:
  - se:build
  - se:feature
  - se:bug
  - se:scout

reads:
  - clients/*/CLAUDE.md
  - clients/*/expertise.yaml
  - clients/*/specs/*.md
  - apps/*/CLAUDE.md
  - apps/*/expertise.yaml
  - apps/*/specs/*.md

writes:
  - "<codebase_path>/src/**/*.{ts,js}"             # backend code
  - "<codebase_path>/src/agents/**"                 # agent layer
  - "<codebase_path>/src/lib/**"                    # shared libs
  - "<codebase_path>/db/**/*.{ts,sql}"              # schemas, migrations (flagged, not applied)
  - "<codebase_path>/server/**"
  - clients/*/expertise.yaml                        # observations only
  - apps/*/expertise.yaml                           # observations only

cwd: <codebase_path>

env:
  REBAR_ROOT: /mnt/c/Users/Big Daddy Pyatt/rebar

rules:
  - Never touch src/components/* or any frontend code unless spec says so
  - Never touch sibling-owned directories (per scope.sibling)
  - Never make real LLM calls during /build unless spec explicitly authorizes — stub with TODO
  - Never apply database migrations live
  - Never add new dependencies without explicit spec authorization
  - Never write to .env files — env values are configured outside the agent
  - Never git add or git commit

invariants:
  authorship:
    rule: |
      Backend code I write is mine. Files authored elsewhere are read-and-extend-only.
  no_delete:
    rule: |
      Files I created can be moved to _archive/ if superseded. Schemas are versioned
      (e.g. `0001_init.sql`), not deleted.
  pinned_bypass:
    rule: |
      Skip any file with `pinned: true` frontmatter.
