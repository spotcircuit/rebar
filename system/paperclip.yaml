# paperclip.yaml -- Declarative config for Paperclip agent orchestration
# Synced to Paperclip API via: bash scripts/paperclip-sync.sh
#
# This is the source of truth. Edit here, then sync.
# Paperclip DB IDs are cached in system/.paperclip-ids.json after first sync.
#
# FRAMEWORK EXAMPLE — replace company_id and agents with your own.

api_base: http://127.0.0.1:3100
company_id: "YOUR_COMPANY_ID_HERE"

# ---------------------------------------------------------------------------
# Agent definitions
# Each agent maps to a file in system/agents/{name}.yaml for detailed config.
# Fields here are what Paperclip's POST /api/companies/{companyId}/agents needs.
#
# Framework agents (shipped with rebar):
# - rebar-steward: maintains expertise.yaml health across apps/clients
# - wiki-curator: processes raw/ into wiki pages
# - site-builder-agent: manages site build/deploy lifecycles
# - triage-agent: routes incoming issues to specialists
#
# Add your own agents in system/agents/{name}.yaml and register them here.
# ---------------------------------------------------------------------------
agents:
  rebar-steward:
    name: Rebar Steward
    description: >
      Maintains expertise.yaml health across all clients and apps.
      Runs /improve periodically, compresses bloated files,
      validates YAML syntax, and promotes confirmed observations.
    role: devops
    definition_file: agents/rebar-steward.yaml
    heartbeat_schedule: "0 */4 * * *"   # every 4 hours
    budget_cents: 500                     # $5/mo cap

  wiki-curator:
    name: Wiki Curator
    description: >
      Keeps the wiki healthy. Processes raw/ intake, runs lint,
      fixes broken links, updates index.md.
    role: researcher
    definition_file: agents/wiki-curator.yaml
    heartbeat_schedule: "*/30 * * * *"   # every 30 minutes (checks raw/)
    budget_cents: 300

  site-builder-agent:
    name: Site Builder Agent
    description: >
      Manages site-builder app lifecycles. Runs builds, checks
      deploy status, updates expertise.yaml with results.
    role: engineer
    definition_file: agents/site-builder-agent.yaml
    heartbeat_schedule: "0 */6 * * *"   # every 6 hours
    budget_cents: 800

  triage-agent:
    name: Triage Agent
    description: >
      Receives new issues, classifies them, assigns to the right agent.
      Lightweight -- just reads issue title/description and routes.
    role: pm
    definition_file: agents/triage-agent.yaml
    heartbeat_schedule: "*/5 * * * *"    # every 5 minutes
    budget_cents: 100

  # ---------------------------------------------------------------------------
  # Phase specialists — issue-driven (no schedule). Each agent is fluent in
  # a cluster of rebar slash commands. Used end-to-end on any rebar project:
  # planner → frontend + backend (parallel) → tester + reviewer → close-loop.
  # Issue description must include a "Scope:" block with project_name,
  # codebase_path, etc. See wiki/patterns/parallel-paperclip-build.md.
  # ---------------------------------------------------------------------------
  # Role values must be in Paperclip's enum:
  # ceo | cto | cmo | cfo | engineer | designer | pm | qa | devops | researcher | general
  # Specialty (planner / frontend / backend / tester / reviewer) is encoded in
  # the agent name + heartbeat_routine, not the role enum.
  rebar-planner:
    name: Rebar Planner
    description: >
      Phase 1 specialist. Runs /plan, /scout, /discover. Reads a brief from
      the issue, writes a spec to clients/<x>/specs/<phase>.md. Issue-driven.
    role: pm
    definition_file: agents/rebar-planner.yaml
    heartbeat_schedule: ~                 # issue-driven, no cron
    budget_cents: 600                     # ~$6/mo, scout/plan can be heavy

  rebar-frontend:
    name: Rebar Frontend
    description: >
      Phase 2 UI specialist. Runs /build, /feature, /bug for UI scope.
      Reads DESIGN.md, validates with /design lint. Parallel-capable
      with rebar-backend. Issue-driven.
    role: engineer
    definition_file: agents/rebar-frontend.yaml
    heartbeat_schedule: ~
    budget_cents: 800

  rebar-backend:
    name: Rebar Backend
    description: >
      Phase 2 server / agent / lib specialist. Runs /build, /feature, /bug
      for non-UI scope. Stubs real LLM/tool calls unless spec authorizes.
      Parallel-capable with rebar-frontend. Issue-driven.
    role: engineer
    definition_file: agents/rebar-backend.yaml
    heartbeat_schedule: ~
    budget_cents: 800

  rebar-tester:
    name: Rebar Tester
    description: >
      Phase 3 verification. Runs /test or /test-learn. Reports failures
      with file:line context. Optionally fixes (mode=fix). Reassigns
      back to engineer if blockers persist. Issue-driven.
    role: qa
    definition_file: agents/rebar-tester.yaml
    heartbeat_schedule: ~
    budget_cents: 400

  rebar-reviewer:
    name: Rebar Reviewer
    description: >
      Phase 3 QA gate. Runs /review and /check. Read-only — never modifies
      code. Categorizes findings as Blocker / Critical / Suggest with
      file:line citations. Moves issue to Needs work / Completed / Signed off.
    role: qa
    definition_file: agents/rebar-reviewer.yaml
    heartbeat_schedule: ~
    budget_cents: 400

# ---------------------------------------------------------------------------
# Default project for issues created by Rebar commands
# ---------------------------------------------------------------------------
default_project:
  name: Rebar Ops
  project_id: "YOUR_PROJECT_ID_HERE"

# ---------------------------------------------------------------------------
# Event hooks -- maps Rebar events to Paperclip issue creation
# ---------------------------------------------------------------------------
hooks:
  raw_file_added:
    title_template: "Ingest: {filename}"
    description_template: "New file in raw/: {filepath}. Run /wiki-ingest."
    assignee: wiki-curator
    priority: medium

  self_improve_due:
    title_template: "Self-improve: {target}"
    description_template: "Run /improve {target}. Last run: {last_run}."
    assignee: rebar-steward
    priority: low

  build_requested:
    title_template: "Build: {app_name}"
    description_template: "Build requested for {app_name}. Check specs/ and run pipeline."
    assignee: site-builder-agent
    priority: high
