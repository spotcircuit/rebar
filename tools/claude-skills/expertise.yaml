# ============================================================================
# FIT EVALUATION: How claude-skills maps to rebar's daily blog + social workflow
# ============================================================================

fit_evaluation:
  use_case: "Daily blog posts + social media about what we're building"

  directly_useful_skills:
    content_production:
      path: marketing-skill/content-production/
      what: "Full pipeline: research → brief → draft → optimize. 3 modes."
      python_tools:
        - "seo_optimizer.py — on-page SEO scoring"
        - "content_scorer.py — quality gates"
        - "brand_voice_analyzer.py — consistency checks"
      fit: "HIGH — this is the blog writing engine"
      integration: >
        Feed expertise.yaml observations + git log as topic source.
        content-production generates SEO-optimized post.
        Paperclip social-media-agent picks up and cross-posts.

    social_content:
      path: marketing-skill/social-content/
      what: "Platform-specific social posts (LinkedIn, Twitter, FB, IG)"
      references:
        - "platforms.md — platform-specific best practices"
        - "post-templates.md — proven formats"
        - "reverse-engineering.md — analyze what works"
      fit: "HIGH — replaces/enhances current social-media-agent prompts"
      integration: >
        Could replace the social-media-agent's content generation step.
        Better templates and platform-specific formatting than what we have.

    content_humanizer:
      path: marketing-skill/content-humanizer/
      what: "Post-processes AI content to remove AI tells"
      python_tools:
        - "humanizer_scorer.py — detects AI patterns"
      references:
        - "ai-tells-checklist.md — specific patterns to fix"
        - "voice-techniques.md — how to sound human"
      fit: "HIGH — already use humanization in scout/outreach, this is more rigorous"

    content_strategy:
      path: marketing-skill/content-strategy/
      what: "Topic clusters, content calendars, keyword research"
      python_tools:
        - "topic_cluster_mapper.py — maps topic relationships"
      fit: "MEDIUM — useful for planning weekly content themes"

    marketing_context:
      path: marketing-skill/marketing-context/
      what: "Creates foundation context doc all skills read first"
      fit: "HIGH — must set up first. Maps to our expertise.yaml pattern."
      integration: >
        Auto-generate marketing-context.md from rebar expertise files.
        Brand voice, positioning, ICP, keywords all derivable from existing data.

    ai_seo:
      path: marketing-skill/ai-seo/
      what: "Optimize for AI search citations (ChatGPT, Perplexity, Gemini)"
      fit: "MEDIUM — forward-looking. GEO matters for visibility."

    launch_strategy:
      path: marketing-skill/launch-strategy/
      what: "Product Hunt, launch playbooks, phased releases"
      fit: "HIGH — HN launch plan for rebar is pending"

    x_twitter_growth:
      path: marketing-skill/x-twitter-growth/
      what: "X/Twitter-specific growth, thread engineering, profile optimization"
      python_tools:
        - "profile_auditor.py"
        - "tweet_composer.py"
        - "competitor_analyzer.py"
        - "growth_tracker.py"
        - "content_planner.py"
      fit: "MEDIUM — useful if expanding to X beyond LinkedIn"

    xurl:
      path: ".claude/skills/social-media/xurl/ (rebar-local, ported 2026-05-01)"
      upstream: "NousResearch/hermes-agent skills/social-media/xurl + xdevplatform/xurl"
      what: "Official X CLI (OAuth 2.0 PKCE). post/reply/quote/delete + media upload + search + likes/reposts/bookmarks + follow + DMs."
      fit: "HIGH — wired (patch deliverable) into cross-post.sh as Step 7, the 7th platform. API-based so independent of CDP."
      cross_post_integration:
        status: "skill shipped; cross-post.sh patch in raw/CON-131-xurl-cross-post-patch.md awaiting operator apply"
        depends_on:
          - "operator runs `xurl auth` once on host"
          - "operator creates scripts/publish-x-xurl.py helper (follow-up issue)"
        idempotency: "blog/published-x.json keyed by slug"

  secondary_useful_skills:
    - "copy-editing/ — readability scoring, polish"
    - "copywriting/ — headline scoring"
    - "programmatic-seo/ — scale page generation"
    - "seo-audit/ — technical SEO checks"
