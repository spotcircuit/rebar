# ============================================================================
# INTEGRATION PLAN: How to wire into rebar + Paperclip
# ============================================================================

integration_plan:
  step_1_context:
    action: "Generate marketing-context.md from rebar expertise files"
    source: "apps/*/expertise.yaml + wiki/ + CLAUDE.md"
    output: ".claude/product-marketing-context.md or marketing-context.md"
    why: "All marketing skills read this first. Single source of truth for brand."

  step_2_blog_pipeline:
    action: "Create a Paperclip blog-writer agent"
    trigger: "Daily or on git push with significant changes"
    workflow:
      - "1. Read today's git log + expertise observations"
      - "2. Pick topic (content-strategy skill picks from cluster)"
      - "3. Generate blog post (content-production skill)"
      - "4. Humanize (content-humanizer skill)"
      - "5. SEO optimize (seo_optimizer.py + ai-seo skill)"
      - "6. Save to blog/ or publish to WordPress"
    files: "New Paperclip agent: system/agents/blog-writer.yaml"

  step_3_social_enhancement:
    action: "Upgrade social-media-agent with social-content skill"
    change: "Replace current prompt with social-content SKILL.md patterns"
    benefit: "Better templates, platform-specific formatting, content pillars"

  step_4_launch:
    action: "Use launch-strategy for HN launch"
    status: "HN launch plan exists in system/drafts/hn-launch-plan.md"
    enhancement: "launch-strategy skill adds phased rollout + momentum tracking"

# ============================================================================
# OVERLAP WITH EXISTING REBAR CAPABILITIES
# ============================================================================

overlap_analysis:
  social_media_agent:
    current: "Paperclip agent posts to LinkedIn + Facebook daily"
    skill_equivalent: "social-content + social-media-manager"
    verdict: "Skills are more structured — better templates, content pillars, platform rules"
    action: "Enhance agent prompts with skill references, don't replace"

  content_humanizer:
    current: "Scout uses humanization step in reply generation"
    skill_equivalent: "content-humanizer"
    verdict: "Skill has ai-tells-checklist.md + humanizer_scorer.py — more rigorous"
    action: "Adopt humanizer_scorer.py as quality gate in scout pipeline"

  outreach_framework:
    current: "Scout + outreach agent generate engagement replies"
    skill_equivalent: "cold-email + copywriting"
    verdict: "Our scout is more specialized for social engagement"
    action: "Keep scout as-is, borrow headline_scorer.py for post titles"

  wiki_knowledge:
    current: "wiki/ + expertise.yaml compound knowledge"
    skill_equivalent: "marketing-context"
    verdict: "marketing-context.md is a focused subset of our expertise system"
    action: "Auto-generate marketing-context.md FROM expertise files"

